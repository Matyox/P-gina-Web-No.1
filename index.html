<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademyContable - Menú de Cursos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a237e;
            --secondary: #00c853;
            --accent: #ffab00;
            --light: #f4f7f6;
            --dark: #333;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 1rem 5%;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 40px;
        }

        /* Contenedor de la barra de navegación del menú */
        .menu-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Estilo de los Desplegables */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-btn {
            background-color: var(--primary);
            color: white;
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .dropdown:hover .dropdown-btn {
            background-color: #0d1661;
        }

        /* Contenido del Desplegable (Oculto por defecto) */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 240px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
            border-radius: 8px;
            z-index: 1;
            margin-top: 5px;
            overflow: hidden;
        }

        /* Enlaces dentro del desplegable */
        .dropdown-content a {
            color: var(--dark);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
            font-weight: 500;
            transition: background 0.2s;
        }

        .dropdown-content a:hover {
            background-color: #e3f2fd;
            color: var(--primary);
        }

        /* Mostrar el menú al pasar el cursor (Hover) */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: #fff;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h2>AcademyContable</h2>
    </header>

    <div class="container">
        <h1>Panel de Aprendizaje Académico</h1>
        <p>Selecciona un módulo o herramienta para comenzar la sesión de estudio:</p>
        <br>

        <div class="menu-nav">
            
            <div class="dropdown">
                <button class="dropdown-btn">Contenido Académico ▾</button>
                <div class="dropdown-content">
                    <a href="fundamentos.html">1. Fundamentos</a>
                    <a href="ciclo-contable.html">2. Ciclo Contable</a>
                    <a href="estados-financieros.html">3. Estados Financieros</a>
                    <a href="fiscal-costos.html">4. Fiscal y Costos</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropdown-btn" style="background-color: var(--secondary);">Tecnología de Vanguardia ▾</button>
                <div class="dropdown-content">
                    <a href="software-pro.html">Software Pro</a>
                    <a href="excel-financiero.html">Excel Financiero</a>
                    <a href="multimedia.html">Multimedia</a>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 AcademyContable - Plataforma de Gestión Educativa.</p>
    </footer>

</body>
</html>
